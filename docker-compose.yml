services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bulkedit
      POSTGRES_PASSWORD: bulkedit_password
      POSTGRES_DB: bulkedit
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bulkedit -d bulkedit"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8100:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bulkedit:bulkedit_password@postgres:5432/bulkedit
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: local
      DEBUG: "true"
      LOG_LEVEL: INFO
      FRONTEND_URL: http://localhost:3100
      BACKEND_URL: http://localhost:8100
      BACKEND_CORS_ORIGINS: http://localhost:3100
      # Video renderer
      VIDEO_RENDERER_ENABLED: ${VIDEO_RENDERER_ENABLED:-false}
      FFMPEG_PATH: ${FFMPEG_PATH:-ffmpeg}
      VIDEO_OUTPUT_DIR: ${VIDEO_OUTPUT_DIR:-/tmp/video_renders}
      # Social integrations
      PINTEREST_CLIENT_ID: ${PINTEREST_CLIENT_ID:-}
      PINTEREST_CLIENT_SECRET: ${PINTEREST_CLIENT_SECRET:-}
      PINTEREST_REDIRECT_URI: ${PINTEREST_REDIRECT_URI:-http://localhost:8100/api/v1/promote/pinterest/callback}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      INSTAGRAM_REDIRECT_URI: ${INSTAGRAM_REDIRECT_URI:-http://localhost:8100/api/v1/promote/instagram/callback}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
    working_dir: /app

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8100
      NEXT_PUBLIC_APP_URL: http://localhost:3100
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    working_dir: /app

volumes:
  postgres_data:
  redis_data:
