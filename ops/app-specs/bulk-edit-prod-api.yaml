name: bulk-edit-prod-api
services:
- name: api
  github:
    repo: Sekiph82/Bulk-Edit
    branch: main
    deploy_on_push: true
  dockerfile_path: apps/backend/Dockerfile
  run_command: uvicorn app.main:app --host 0.0.0.0 --port 8000
  source_dir: apps/backend
  envs:
  - key: ENVIRONMENT
    value: production
    scope: RUN_AND_BUILD_TIME
  - key: DEBUG
    value: 'false'
    scope: RUN_AND_BUILD_TIME
  - key: LOG_LEVEL
    value: INFO
    scope: RUN_AND_BUILD_TIME
  - key: FRONTEND_URL
    value: https://app.bulkeditapp.com
    scope: RUN_AND_BUILD_TIME
  - key: BACKEND_URL
    value: https://api.bulkeditapp.com
    scope: RUN_AND_BUILD_TIME
  - key: BACKEND_CORS_ORIGINS
    value: https://app.bulkeditapp.com,https://bulkeditapp.com,https://www.bulkeditapp.com
    scope: RUN_AND_BUILD_TIME
  - key: RATE_LIMIT_ENABLED
    value: 'true'
    scope: RUN_AND_BUILD_TIME
  - key: RATE_LIMIT_BACKEND
    value: redis
    scope: RUN_AND_BUILD_TIME
  - key: DATABASE_URL
    value: ${prod-db.DATABASE_URL}
    scope: RUN_TIME
  - key: REDIS_URL
    value: ${prod-redis.DATABASE_URL}
    scope: RUN_TIME
  - key: ETSY_REDIRECT_URI
    value: https://api.bulkeditapp.com/api/v1/etsy/callback
    scope: RUN_AND_BUILD_TIME
  - key: PINTEREST_REDIRECT_URI
    value: https://api.bulkeditapp.com/api/v1/promote/pinterest/callback
    scope: RUN_AND_BUILD_TIME
  - key: INSTAGRAM_REDIRECT_URI
    value: https://api.bulkeditapp.com/api/v1/promote/instagram/callback
    scope: RUN_AND_BUILD_TIME
  - key: AI_PROVIDER
    value: mock
    scope: RUN_AND_BUILD_TIME
  - key: VIDEO_RENDERER_ENABLED
