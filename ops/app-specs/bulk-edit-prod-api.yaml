  instance_size_slug: basic-xs
  instance_count: 1
  http_port: 8000
  health_check:
    initial_delay_seconds: 20
    period_seconds: 15
    failure_threshold: 5
    http_path: /api/v1/health
jobs:
- name: migrate
  github:
    repo: Sekiph82/Bulk-Edit
    branch: main
  dockerfile_path: apps/backend/Dockerfile
  run_command: alembic upgrade head
  source_dir: apps/backend
  envs:
  - key: ENVIRONMENT
    value: production
    scope: RUN_AND_BUILD_TIME
  - key: DATABASE_URL
    value: ${prod-db.DATABASE_URL}
    scope: RUN_TIME
  instance_size_slug: apps-s-1vcpu-0.5gb
  instance_count: 1
  kind: PRE_DEPLOY
- name: retention-cleanup
  kind: SCHEDULED
  schedule:
    cron: 30 3 * * *
  github:
    repo: Sekiph82/Bulk-Edit
    branch: main
  dockerfile_path: apps/backend/Dockerfile
  source_dir: apps/backend
  run_command: python scripts/run_retention_cleanup.py
  envs:
  - key: ENVIRONMENT
    value: production
    scope: RUN_AND_BUILD_TIME
  - key: DATABASE_URL
    value: ${prod-db.DATABASE_URL}
    scope: RUN_TIME
  instance_size_slug: apps-s-1vcpu-0.5gb
  instance_count: 1
databases:
- name: prod-db
  engine: PG
  production: true
  cluster_name: bulk-edit-prod-db
- name: prod-redis
  engine: VALKEY
  production: true
  cluster_name: bulk-edit-prod-redis
domains:
- domain: api.bulkeditapp.com
  type: PRIMARY
region: nyc
ingress:
  rules:
  - match:
      path:
        prefix: /
    component:
      name: api
features:
- buildpack-stack=ubuntu-22
