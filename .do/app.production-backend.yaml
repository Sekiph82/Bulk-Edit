# DigitalOcean App Platform - PRODUCTION BACKEND (api.bulkeditapp.com)
# Deploys from `main`. Provisioned in limited "Marketing + API Health +
# Private Beta" mode: Etsy/Stripe are intentionally left unconfigured
# (placeholder defaults in app/core/config.py) so is_etsy_configured() /
# is_stripe_configured() stay false and those endpoints return a clean 503
# instead of ever redirecting to a real (garbage-credentialed) OAuth/checkout
# URL. Email IS configured — see SMTP_* below, reusing the same verified
# bulkeditapp.com Resend sending domain already used by staging.

name: bulk-edit-prod-api
region: nyc

domains:
  - domain: api.bulkeditapp.com
    type: PRIMARY

services:
  - name: api
    github:
      repo: Sekiph82/Bulk-Edit
      branch: main
      deploy_on_push: true
    source_dir: apps/backend
    dockerfile_path: apps/backend/Dockerfile
    http_port: 8000
    instance_count: 2 # HA; adjust to load
    instance_size_slug: basic-xs
    run_command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    health_check:
      http_path: /api/v1/health
      initial_delay_seconds: 20
      period_seconds: 15
      failure_threshold: 5
    envs:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: FRONTEND_URL
        value: https://app.bulkeditapp.com
      - key: BACKEND_URL
        value: https://api.bulkeditapp.com
      # App subdomain calls the API; apex + www marketing may call it for the contact form.
      - key: BACKEND_CORS_ORIGINS
        value: https://app.bulkeditapp.com,https://bulkeditapp.com,https://www.bulkeditapp.com
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_BACKEND
        value: redis
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${prod-db.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${prod-redis.DATABASE_URL}
      - key: ETSY_REDIRECT_URI
        value: https://api.bulkeditapp.com/api/v1/etsy/callback
      - key: PINTEREST_REDIRECT_URI
        value: https://api.bulkeditapp.com/api/v1/promote/pinterest/callback
      - key: INSTAGRAM_REDIRECT_URI
        value: https://api.bulkeditapp.com/api/v1/promote/instagram/callback
      # Left at the safe "mock" default (no real AI provider) until an
      # OPENAI_API_KEY/ANTHROPIC_API_KEY (SECRET) is actually provided —
      # avoids AI_PROVIDER pointing at a provider with no working key.
      - key: AI_PROVIDER
        value: mock
      # Product Video Generator: ffmpeg is installed in the Docker image
      # (see apps/backend/Dockerfile) — real MP4 rendering, download only,
      # never auto-uploaded to Etsy.
      - key: VIDEO_RENDERER_ENABLED
        value: "true"
      # Email (Resend, SMTP) — reuses the same verified bulkeditapp.com
      # sending domain already used by staging. SMTP_PASSWORD is the Resend
      # API key, set separately as a SECRET (never in this file).
      - key: EMAIL_PROVIDER
        value: smtp
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        value: resend
      - key: SMTP_FROM_EMAIL
        value: noreply@bulkeditapp.com
      - key: SUPPORT_EMAIL
        value: support@bulkeditapp.com
      - key: APP_PUBLIC_URL
        value: https://app.bulkeditapp.com

jobs:
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: Sekiph82/Bulk-Edit
      branch: main
    source_dir: apps/backend
    dockerfile_path: apps/backend/Dockerfile
    run_command: alembic upgrade head
    envs:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${prod-db.DATABASE_URL}

# Both are standalone managed clusters (not inline app-bundled databases) —
# DO App Platform requires production-tier Redis/Valkey to be a pre-existing
# standalone cluster referenced by cluster_name (same reason staging's Redis
# had to move to a standalone Valkey cluster; see DIGITALOCEAN_DEPLOY.md).
# Postgres was also provisioned standalone here for consistency/decoupling
# from app lifecycle. Already created and online: bulk-edit-prod-db,
# bulk-edit-prod-redis.
databases:
  - name: prod-db
    engine: PG
    cluster_name: bulk-edit-prod-db
    production: true
  - name: prod-redis
    engine: VALKEY
    cluster_name: bulk-edit-prod-redis
    production: true

# REQUIRED SECRETS (DO dashboard, encrypted) - LIVE values at launch:
#   JWT_SECRET, ENCRYPTION_KEY (generated fresh, never reused from staging),
#   SMTP_PASSWORD (Resend API key, may reuse staging's — same verified domain).
# STILL MISSING, left unconfigured (safe placeholder defaults apply, gate
# cleanly to 503 rather than exposing broken flows) until provided:
#   STRIPE_SECRET_KEY (sk_live_), STRIPE_WEBHOOK_SECRET, STRIPE_PRICE_* (4, live),
#   ETSY_CLIENT_ID/_SECRET, OPENAI_API_KEY/ANTHROPIC_API_KEY (optional),
#   PINTEREST_*/META_* (optional), SENTRY_DSN (optional)
