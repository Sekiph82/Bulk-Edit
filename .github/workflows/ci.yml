name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bulk_edit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/bulk_edit_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      JWT_SECRET: ci-test-jwt-secret-not-real-64chars-padding-here-xxxxxxxxxx
      ENCRYPTION_KEY: uOv7K6PYL6v4G77O0WqJrA5BrM42x3NCAQZUSO2rTio=
      AI_PROVIDER: mock
      STRIPE_SECRET_KEY: ""
      ETSY_CLIENT_ID: ""
      ETSY_CLIENT_SECRET: ""
      RATE_LIMIT_ENABLED: "false"
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: apps/backend
        run: pip install -r requirements-dev.txt

      - name: Validate environment config (development mode)
        working-directory: apps/backend
        run: python scripts/validate_env.py --env development
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/bulk_edit_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          JWT_SECRET: ci-test-jwt-secret-not-real-64chars-padding-here-xxxxxxxxxx
          ENCRYPTION_KEY: uOv7K6PYL6v4G77O0WqJrA5BrM42x3NCAQZUSO2rTio=
          AI_PROVIDER: mock
          BACKEND_CORS_ORIGINS: http://localhost:3100
          FRONTEND_URL: http://localhost:3100
          RATE_LIMIT_ENABLED: "false"
          RATE_LIMIT_BACKEND: memory

      - name: Run Alembic migrations
        working-directory: apps/backend
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/bulk_edit_test

      - name: Run backend tests
        working-directory: apps/backend
        run: python -m pytest --tb=short -q

  frontend-checks:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8100
      NEXT_PUBLIC_APP_URL: http://localhost:3100

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Lint
        working-directory: apps/frontend
        run: npm run lint

      - name: Build
        working-directory: apps/frontend
        run: npm run build

  docker-compose-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose config
